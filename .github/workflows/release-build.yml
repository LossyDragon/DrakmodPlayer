name: Build Signed Release APK

on:
  push:
    branches: [ master ]
    paths:
      - 'app/build.gradle.kts'
  workflow_dispatch:

permissions:
  contents: read

# Cancel an in-progress run if a newer push to the same ref comes in.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Gate: only proceed if :app versionCode actually changed in this push.
  # The path filter above already narrows this to commits that touch
  # app/build.gradle.kts; this job ensures the change is specifically the
  # versionCode bump and not something else in that file.
  # ---------------------------------------------------------------------------
  check-version:
    name: Check versionCode changed
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version_code: ${{ steps.diff.outputs.version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Diff versionCode
        id: diff
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          FILE="app/build.gradle.kts"

          CURRENT=$(grep -E '^\s*versionCode\s*=' "$FILE" | head -n1 | sed -E 's/.*=\s*([0-9]+).*/\1/')
          echo "Current versionCode: $CURRENT"
          echo "version_code=$CURRENT" >> "$GITHUB_OUTPUT"

          if [[ -z "${BEFORE_SHA:-}" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "No previous commit — treating as changed."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # fetch-depth: 2 covers most cases, but for pushes of >1 commit we
          # may need to fetch the before-SHA explicitly.
          if ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            git fetch --depth=1 origin "$BEFORE_SHA" 2>/dev/null || {
              echo "Could not fetch $BEFORE_SHA — treating as changed."
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            }
          fi

          PREVIOUS=$(git show "$BEFORE_SHA:$FILE" 2>/dev/null \
            | grep -E '^\s*versionCode\s*=' \
            | head -n1 \
            | sed -E 's/.*=\s*([0-9]+).*/\1/' || true)
          echo "Previous versionCode: ${PREVIOUS:-<none>}"

          if [[ "$CURRENT" != "$PREVIOUS" ]]; then
            echo "versionCode changed: ${PREVIOUS:-<none>} -> $CURRENT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "versionCode unchanged — skipping build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build signed release APK
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Cache Android SDK build-cache
        uses: actions/cache@v4
        with:
          path: ~/.android/build-cache
          key: ${{ runner.os }}-android-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-android-

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$KEYSTORE_BASE64" ]]; then
            echo "::error::KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "::add-mask::$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ runner.temp }}/release.jks"

      - name: Build release APK
        env:
          ORG_GRADLE_PROJECT_modArchiveApiKey: ${{ secrets.MOD_ARCHIVE_API_KEY }}
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:packageRelease --build-cache --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: DragonModPlayer-release-v${{ needs.check-version.outputs.version_code }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
